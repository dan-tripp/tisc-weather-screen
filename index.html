<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Weather Screen</title>
	<style>
		:root {
			color-scheme: light;
			font-family: Arial, Helvetica, sans-serif;
			background: #f4f7f9;
			color: #1d252c;
		}

		body {
			margin: 0;
			min-height: 100vh;
			overflow: hidden;
		}

		main {
			display: grid;
			grid-template-columns: 320px minmax(0, 1fr);
			gap: 16px;
			height: 100vh;
			padding: 16px;
			box-sizing: border-box;
		}

		.embed {
			width: 100%;
			border: 0;
			background: #fff;
		}

		.current {
			width: 296px;
			height: 191px;
		}

		.hourly {
			display: block;
			height: calc(100vh + 300px);
			transform: translateY(-300px);
		}

		.hourly-window {
			height: calc(100vh - 32px);
			overflow: hidden;
		}

		.left-widgets {
			display: grid;
			align-content: start;
			gap: 16px;
			height: calc(100vh - 32px);
			overflow: auto;
		}

		.metar-widget {
			width: 300px;
			height: 435px;
			display: block;
			font-size: 18px;
			font-weight: 500;
			color: #000;
		}
	</style>
</head>
<body>
	<main>
		<section class="left-widgets" aria-label="METAR and wind forecast widgets">
			<a
				class="metar-widget"
				href="https://metar-taf.com/metar/CYTZ"
				id="metartaf-l1JDyf9u">METAR Billy Bishop Toronto City Airport</a>
			<script async defer crossorigin="anonymous" src="https://metar-taf.com/embed-js/CYTZ?visibility=mi&qnh=inHg&rh=rh&target=l1JDyf9u"></script>

			<script src="https://www.windfinder.com/widget/forecast/js/toronto_island?unit_wave=m&unit_rain=mm&unit_temperature=c&unit_wind=kts&unit_pressure=hPa&days=1&show_day=0&show_pressure=0&show_waves=0&show_temperature=0&show_clouds=0"></script><noscript><a rel="nofollow" href="https://www.windfinder.com/forecast/toronto_island?utm_source=forecast&utm_medium=web&utm_campaign=homepageweather&utm_content=noscript-Toronto Island Airport">Wind forecast for Toronto Island Airport</a> provided by <a rel="nofollow" href="https://www.windfinder.com?utm_source=forecast&utm_medium=web&utm_campaign=homepageweather&utm_content=noscript-logo">windfinder.com</a></noscript>
		</section>

		<div class="hourly-window">

		<script id="wg_fwdg_517964_54_1780060760836">

		var loader = function () {
			var arg = ["s=517964" ,"m=54","uid=wg_fwdg_517964_54_1780060760836" ,"wj=knots" ,"tj=c" ,"waj=m" ,"tij=cm" ,"odh=0" ,"doh=24" ,"fhours=240" ,"hrsm=1" ,"vt=forecasts" ,"lng=en" ,"p=WINDSPD,GUST,SMER,TMP,APCP1s"];
			var script = document.createElement("script");
			var tag = document.getElementsByTagName("script")[0];
			script.src = "https://www.windguru.cz/js/widget.php?"+(arg.join("&"));
			tag.parentNode.insertBefore(script, tag);

		</div>
	</main>
</body>
</html>
