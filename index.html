<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>TISC Weather Screen</title>
	<style>

		:root {
			color-scheme: light;
			font-family: Arial, Helvetica, sans-serif;
			--right-column-width: 700px;
			--weather-gov-wind-history-scroll-offset: 300px;
			background: #f4f7f9;
			color: #1d252c;
		}

		body {
			margin: 0;
			min-height: 100vh;
			overflow: hidden;
		}

		main {
			display: grid;
			grid-template-columns: 320px minmax(0, 1fr) var(--right-column-width);
			gap: 16px;
			height: 100vh;
			padding: 16px 16px 40px;
			box-sizing: border-box;
		}

		.metar-section,
		.middle-column,
		.rightmost-column {
			display: grid;
			align-content: start;
			gap: 16px;
			height: calc(100vh - 56px);
			overflow: auto;
		}

		.metar-widget {
			width: 300px;
			height: 435px;
			display: block;
			font-size: 18px;
			font-weight: 500;
			color: #000;
		}

		.weather-gov-wind-history-iframe {
			width: 100%;
			height: calc(300px + var(--weather-gov-wind-history-scroll-offset));
			border: 0;
			background: #fff;
			transform: translateY(calc(-1 * var(--weather-gov-wind-history-scroll-offset)));
		}

		.wordy-border-frame {
			display: grid;
			grid-template-areas:
				"top top top"
				"left content right"
				"bottom bottom bottom";
			grid-template-columns: 24px minmax(0, 1fr) 24px;
			grid-template-rows: 24px 300px 24px;
			width: 100%;
			background: #1d252c;
			color: #fff;
			font-size: 11px;
			font-weight: 700;
			letter-spacing: 0;
			line-height: 24px;
		}

		.wordy-border-text {
			overflow: hidden;
			white-space: nowrap;
		}

		.wordy-border-top {
			grid-area: top;
			padding-left: 6px;
		}

		.wordy-border-right {
			grid-area: right;
			writing-mode: vertical-rl;
		}

		.wordy-border-bottom {
			grid-area: bottom;
			padding-left: 6px;
			transform: rotate(180deg);
		}

		.wordy-border-left {
			grid-area: left;
			writing-mode: vertical-rl;
			transform: rotate(180deg);
		}

		.wordy-border-content {
			grid-area: content;
			height: 300px;
			overflow: hidden;
		}

		.loaded-at {
			position: fixed;
			right: 16px;
			bottom: 10px;
			font-size: 13px;
			color: #4a5965;
		}
	</style>
	<script>

function scheduleWholePageReload() {
	window.setTimeout(function () {
		window.location.reload();
	}, 5 * 60 * 1000);
}
scheduleWholePageReload();

function setPageLoadedAtText() {
	let el = document.getElementById("loaded-at");
	let now = new Date();

	el.textContent = "This page was last refreshed on " + now.toLocaleString([], {
		weekday: "long",
		month: "long",
		day: "numeric",
		hour: "numeric",
		minute: "2-digit",
	}) + ".  The refresh times of the source data are unknown.";
}

function addWordyBorder(element_, string_) {
	let repeatedText = (string_ + " ").repeat(99);
	let content = element_.firstElementChild;

	for(let side of ["top", "right", "bottom", "left"]) {
		let borderText = document.createElement("div");
		borderText.className = "wordy-border-text wordy-border-" + side;
		borderText.textContent = repeatedText;
		element_.insertBefore(borderText, content);
	}
}

window.addEventListener("DOMContentLoaded", function () {
	addWordyBorder(document.getElementById("recent-wind-history"), "TODAY'S WIND HISTORY\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0");
	setPageLoadedAtText();
});

/* this works around a bug in wind guru where visually the wind guru content doesn't show up at all.  it takes up no space in the layout.  but inside the iframe, the dom content is all there.  afaics it happens solely b/c sometimes the wind guru iframe gets a style attribute which contains "height: 0px".  and of course it was the wind guru JS that did that.  I don't know why it did it.  the wind guru JS must have a bug.  I couldn't reproduce this bug on demand by reloading the page w/ ctrl+r.  but it was easy to reproduce if I left the page open in a tab for a few hours.  I saw the bug that way about five times, in the first two days of this project.  IIRC I saw it both on localhost and github pages.  */
function workAroundWindGuruBug() {
	window.addEventListener("load", function () {
		var windguruRetryDelay = 5*1000;

		function isWindGuruIframe(frame) {
			return frame.tagName === "IFRAME" &&
				frame.src.indexOf("windguru.cz/") !== -1;
		}

		function scheduleWindGuruIframeReloadIfNecessary(frame) {
			if(frame.dataset.windguruReloadScheduled === "true") return; // this is necessary (or at least: /warranted/) b/c we'll get to this line repeatedly for the windguru iframe.  in turn b/c our mutation observer casts a wide net in terms of the events it triggers on.  I don't know which events happen and when, and I don't need to know. 

			frame.dataset.windguruReloadScheduled = "true";

			window.setTimeout(function () {
				frame.dataset.windguruReloadScheduled = "false";
				if(frame.offsetHeight > 0) return; // 0 is the symptom of the problem.  it's not exactly the /cause/ of it.  the cause is <iframe style="... height: 0px; ..." 
				frame.src = frame.src; // this is what does the "reload".
			}, windguruRetryDelay);
		}

		function scheduleWindGuruIframeReloadsIfNecessary() {
			document.querySelectorAll("iframe").forEach(function (iframe) {
				if(isWindGuruIframe(iframe)) {
					scheduleWindGuruIframeReloadIfNecessary(iframe);
				}
			});
		}

		var observer = new MutationObserver(scheduleWindGuruIframeReloadsIfNecessary);

		observer.observe(document.body, {
			childList: true,
			subtree: true,
			attributes: true,
			attributeFilter: ["style", "src"],
		});

		scheduleWindGuruIframeReloadsIfNecessary();
	});
}
workAroundWindGuruBug();


	</script>
</head>

	</main>

</html>
